name: Debug ECS

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/python-learning
            
            echo "=== 时间 ==="
            date
            
            echo ""
            echo "=== Git 状态 ==="
            git log --oneline -3 || echo "Git 未初始化"
            
            echo ""
            echo "=== 容器状态 ==="
            docker-compose ps
            
            echo ""
            echo "=== 所有容器日志 (最后 100 行) ==="
            docker-compose logs --tail=100
            
            echo ""
            echo "=== 测试后端连接 ==="
            docker-compose exec -T backend curl -s http://localhost:8000/api/health 2>&1 || echo "后端无法访问"
            
            echo ""
            echo "=== 检查端口 ==="
            netstat -tlnp | grep -E ":(80|8000|5432)" || echo "端口未监听"
