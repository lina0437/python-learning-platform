name: Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          command_timeout: 3h
          script: |
            set -e
            
            REPO_URL="lina0437/python-learning-platform"
            ECS_HOST="${{ secrets.ECS_HOST }}"
            
            echo "Configuring Docker mirrors..."
            sudo mkdir -p /etc/docker
            sudo tee /etc/docker/daemon.json <<-'EOF'
            {
              "registry-mirrors": [
                "https://docker.m.daocloud.io",
                "https://docker.1panel.live"
              ]
            }
            EOF
            sudo systemctl daemon-reload
            sudo systemctl restart docker
            echo "Docker mirrors configured"
            
            echo "=== Starting Deployment ==="
            echo "REPO_URL: ${REPO_URL}"
            
            if [ ! -d "/opt/python-learning" ]; then
              sudo mkdir -p /opt/python-learning
            fi
            cd /opt/python-learning
            
            if [ ! -d ".git" ]; then
              sudo git clone https://github.com/${REPO_URL}.git .
            else
              sudo git fetch origin main
              sudo git reset --hard origin/main
            fi
            
            if [ ! -f ".env" ]; then
              DB_PASS=$(openssl rand -hex 16)
              SECRET=$(openssl rand -hex 32)
              echo "DB_PASSWORD=${DB_PASS}" > .env
              echo "SECRET_KEY=${SECRET}" >> .env
              echo "SERVER_IP=${ECS_HOST}" >> .env
            fi
            
            curl -sSL https://raw.githubusercontent.com/${REPO_URL}/main/docker-compose.prod.yml -o docker-compose.yml || true
            curl -sSL https://raw.githubusercontent.com/${REPO_URL}/main/nginx.prod.conf -o nginx.conf || true
            
            echo "Building Docker images..."
            sudo docker-compose build
            
            echo "Starting services..."
            sudo docker-compose up -d
            
            sleep 20
            
            echo "Running migrations..."
            sudo docker-compose exec -T backend alembic upgrade head || true
            
            echo "Creating sample data..."
            sudo docker-compose exec -T backend python scripts/seed_courses.py || true
            
            echo "=== Deployment Complete ==="
            echo "Access: http://${ECS_HOST}"
