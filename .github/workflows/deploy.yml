name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e
            cd /opt/python-learning || (sudo mkdir -p /opt/python-learning && cd /opt/python-learning)
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi
            if [ ! -f ".env" ]; then
              echo "DB_PASSWORD=$(openssl rand -hex 16)" > .env
              echo "SECRET_KEY=$(openssl rand -hex 32)" >> .env
              echo "SERVER_IP=${{ secrets.ECS_HOST }}" >> .env
            fi
            curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml -o docker-compose.yml
            curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/nginx.prod.conf -o nginx.conf
            docker-compose build
            docker-compose up -d
            sleep 15
            docker-compose exec -T backend alembic upgrade head || true
            docker-compose exec -T backend python scripts/seed_courses.py || true
            echo "Deployment complete! Access: http://${{ secrets.ECS_HOST }}"
