name: Deploy to ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.ECS_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H 8.131.100.101 >> ~/.ssh/known_hosts
      
      - name: Deploy to ECS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} << 'ENDSSH'
            set -e
            
            echo "🚀 开始部署..."
            
            # 进入应用目录
            cd /opt/python-learning || {
              echo "创建应用目录..."
              sudo mkdir -p /opt/python-learning
              cd /opt/python-learning
            }
            
            # 如果是首次部署，克隆仓库
            if [ ! -d ".git" ]; then
              echo "📦 首次部署，克隆仓库..."
              sudo git clone https://github.com/${{ github.repository }}.git .
              sudo chown -R $USER:$USER .
            else
              echo "🔄 更新代码..."
              git pull origin main
            fi
            
            # 创建环境变量文件 (如果不存在)
            if [ ! -f ".env" ]; then
              echo "⚙️ 创建环境变量..."
              cat > .env << EOF
DB_PASSWORD=$(openssl rand -hex 16)
SECRET_KEY=$(openssl rand -hex 32)
SERVER_IP=${{ secrets.ECS_HOST }}
EOF
              echo "⚠️ 重要：请保存以下信息："
              cat .env
            fi
            
            # 创建 Docker Compose 配置
            echo "📝 创建 Docker Compose 配置..."
            cat > docker-compose.yml << 'EOF'
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: python_learning_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-python123}
      POSTGRES_DB: python_learning
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: python_learning_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - app-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: python_learning_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-python123}@postgres:5432/python_learning
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-prod-secret-key}
      - CORS_ORIGINS=["http://${SERVER_IP:-8.131.100.101}","http://localhost:5173"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: python_learning_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: python_learning_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
EOF
            
            # 创建 Nginx 配置
            echo "📝 创建 Nginx 配置..."
            cat > nginx.conf << 'EOF'
server {
    listen 80;
    server_name _;
    
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }
}
EOF
            
            # 构建并启动
            echo "🔨 构建 Docker 镜像..."
            docker-compose build
            
            echo "🚀 启动服务..."
            docker-compose up -d
            
            # 等待服务启动
            echo "⏳ 等待服务启动..."
            sleep 15
            
            # 执行数据库迁移
            echo "📊 执行数据库迁移..."
            docker-compose exec -T backend alembic upgrade head || true
            
            # 创建示例数据
            echo "🌱 创建示例课程数据..."
            docker-compose exec -T backend python scripts/seed_courses.py || true
            
            echo "✅ 部署完成！"
            echo ""
            echo "========================================"
            echo "访问地址："
            echo "  前端：http://${SERVER_IP:-8.131.100.101}"
            echo "  API 文档：http://${SERVER_IP:-8.131.100.101}/docs"
            echo "========================================"
            
          ENDSSH
      
      - name: Verify deployment
        run: |
          echo "✅ 部署完成！"
          echo "请访问：http://${{ secrets.ECS_HOST }}"
          echo "API 文档：http://${{ secrets.ECS_HOST }}/docs"
