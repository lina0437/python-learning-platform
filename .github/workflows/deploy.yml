name: Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to ECS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            #!/bin/bash
            set -e
            
            echo "Starting deployment..."
            
            # Create directory if not exists
            if [ ! -d "/opt/python-learning" ]; then
              sudo mkdir -p /opt/python-learning
            fi
            cd /opt/python-learning
            
            # Clone or pull code
            if [ ! -d ".git" ]; then
              echo "First deployment, cloning repository..."
              git clone https://github.com/${{ github.repository }}.git .
            else
              echo "Updating code..."
              git pull origin main
            fi
            
            # Create .env if not exists
            if [ ! -f ".env" ]; then
              echo "Creating environment file..."
              DB_PASS=$(openssl rand -hex 16)
              SECRET=$(openssl rand -hex 32)
              echo "DB_PASSWORD=$DB_PASS" > .env
              echo "SECRET_KEY=$SECRET" >> .env
              echo "SERVER_IP=${{ secrets.ECS_HOST }}" >> .env
              echo "IMPORTANT: Save these credentials!"
              cat .env
            fi
            
            # Create docker-compose.yml
            echo "Creating Docker Compose configuration..."
            cat > docker-compose.yml << 'EOF'
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: python_learning_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-python123}
      POSTGRES_DB: python_learning
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: python_learning_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: python_learning_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-python123}@postgres:5432/python_learning
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-prod-secret-key}
      - CORS_ORIGINS=["http://${SERVER_IP:-8.131.100.101}"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: python_learning_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: python_learning_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
EOF
            
            # Create nginx.conf
            echo "Creating Nginx configuration..."
            cat > nginx.conf << 'EOF'
server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }
}
EOF
            
            # Build and start services
            echo "Building Docker images..."
            docker-compose build
            
            echo "Starting services..."
            docker-compose up -d
            
            echo "Waiting for services to start..."
            sleep 15
            
            echo "Running database migrations..."
            docker-compose exec -T backend alembic upgrade head || true
            
            echo "Creating sample data..."
            docker-compose exec -T backend python scripts/seed_courses.py || true
            
            echo "Deployment completed!"
            echo "========================================"
            echo "Access URLs:"
            echo "  Frontend: http://${{ secrets.ECS_HOST }}"
            echo "  API Docs: http://${{ secrets.ECS_HOST }}/docs"
            echo "========================================"
