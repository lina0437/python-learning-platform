name: Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e
            cd /opt/python-learning || (sudo mkdir -p /opt/python-learning && cd /opt/python-learning)
            [ ! -d ".git" ] && git clone https://github.com/${{ github.repository }}.git . || git pull origin main
            [ ! -f ".env" ] && (DB_PASS=$(openssl rand -hex 16) && echo "DB_PASSWORD=$DB_PASS" > .env && echo "SECRET_KEY=$(openssl rand -hex 32)" >> .env && echo "SERVER_IP=${{ secrets.ECS_HOST }}" >> .env)
            echo "version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: python_learning_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-python123}
      POSTGRES_DB: python_learning
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [\"CMD-SHELL\", \"pg_isready -U postgres\"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: python_learning_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - app-network
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: python_learning_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-python123}@postgres:5432/python_learning
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-prod-secret-key}
      - CORS_ORIGINS=[\"http://${SERVER_IP:-8.131.100.101}\"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: python_learning_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - app-network
  nginx:
    image: nginx:alpine
    container_name: python_learning_nginx
    restart: always
    ports:
      - \"80:80\"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
volumes:
  postgres_data:
  redis_data:
networks:
  app-network:
    driver: bridge" > docker-compose.yml
            echo "server {
    listen 80;
    server_name _;
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }
    location /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }
}" > nginx.conf
            docker-compose build
            docker-compose up -d
            sleep 15
            docker-compose exec -T backend alembic upgrade head || true
            docker-compose exec -T backend python scripts/seed_courses.py || true
            echo "Done! Access: http://${{ secrets.ECS_HOST }}"
