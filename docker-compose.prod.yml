version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: python_learning_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-python123}
      POSTGRES_DB: python_learning
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: python_learning_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - app-network
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: python_learning_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-python123}@postgres:5432/python_learning
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-prod-secret-key}
      - CORS_ORIGINS=["http://${SERVER_IP:-8.131.100.101}"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: python_learning_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - app-network
  nginx:
    image: nginx:alpine
    container_name: python_learning_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
volumes:
  postgres_data:
  redis_data:
networks:
  app-network:
    driver: bridge
